# Runs the BrowserStack SDK sample against a given commit and reports a status check.
# Trigger: Actions tab -> "Reqnroll (xUnit + Playwright) SDK sample test" -> Run workflow -> paste the PR's full commit SHA.
# Requires repo secrets: BROWSERSTACK_USERNAME, BROWSERSTACK_ACCESS_KEY.
name: Reqnroll (xUnit + Playwright) SDK sample test

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'The full commit id to build'
        required: true

jobs:
  sdk-sample:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        os: [windows-latest]
        dotnet: ['8.0.x']
    name: reqnroll-xunit .NET ${{ matrix.dotnet }} sample
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}
      - name: Mark status check in_progress
        uses: actions/github-script@v7
        env:
          job_name: reqnroll-xunit .NET ${{ matrix.dotnet }} sample
          commit_sha: ${{ github.event.inputs.commit_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner, repo: context.repo.repo,
              name: process.env.job_name, head_sha: process.env.commit_sha,
              status: 'in_progress'
            }).catch(e => console.log('check create failed:', e.status));
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - name: Restore
        run: |
          dotnet tool restore
          dotnet restore
      - name: Run sample test
        run: |
          dotnet test --filter "Category=sample-test"
      - name: Mark status check completed
        if: always()
        uses: actions/github-script@v7
        env:
          conclusion: ${{ job.status }}
          job_name: reqnroll-xunit .NET ${{ matrix.dotnet }} sample
          commit_sha: ${{ github.event.inputs.commit_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner, repo: context.repo.repo,
              name: process.env.job_name, head_sha: process.env.commit_sha,
              status: 'completed', conclusion: process.env.conclusion
            }).catch(e => console.log('check create failed:', e.status));
