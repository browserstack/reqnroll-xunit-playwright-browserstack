# =============================
# Set BrowserStack Credentials
# =============================
# Add your BrowserStack userName and accessKey here or set BROWSERSTACK_USERNAME and
# BROWSERSTACK_ACCESS_KEY as env variables
userName: YOUR_USERNAME
accessKey: YOUR_ACCESS_KEY

# ======================
# BrowserStack Reporting
# ======================
projectName: BrowserStack Samples
buildName: browserstack build
buildIdentifier: '#${BUILD_NUMBER}'
# `framework` lets the SDK send test context (name, status) to BrowserStack.
# For the C# SDK, Reqnroll on the xUnit runner uses the `reqnroll` framework token.
framework: reqnroll

# =======================================
# Platforms (Browsers / Devices to test)
# =======================================
platforms:
  - os: OS X
    osVersion: Big Sur
    browserName: Chrome
    browserVersion: latest
  - os: Windows
    osVersion: 10
    browserName: Edge
    browserVersion: latest
  - deviceName: Samsung Galaxy S22 Ultra
    browserName: chrome
    osVersion: 12.0

# =======================
# Parallels per Platform
# =======================
parallelsPerPlatform: 1

# ==========================================
# BrowserStack Automate + Local
# ==========================================
browserstackAutomation: true
browserstackLocal: true

source: reqnroll-xunit-playwright-browserstack:sample-sdk:v1.0

# ======================
# Test Observability
# ======================
testObservability: true

# ===================
# Debugging features
# ===================
debug: false
networkLogs: false
consoleLogs: errors
